<!doctype html>
<html lang="en">
  <head>
    <!-- ========================================================= -->
    <!-- Basic -->
    <!-- ========================================================= -->

    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <meta
      name="description"
      content="NYDL (NYDev Learning) is Ethiopia's modern online technology learning platform for students aged 13–19. Learn Frontend, Backend, Mobile Development, Cybersecurity, DevOps and more through live mentor-led cohorts, real-world projects, internships and community."
    />

    <meta
      name="keywords"
      content="NYDL, NYDev Learning, Programming Ethiopia, Coding Bootcamp Ethiopia, Learn Programming, Frontend, Backend, React, Node.js, Mobile Development, Cybersecurity, DevOps, AI, Machine Learning, Programming Courses, Software Engineering, Online Learning Ethiopia"
    />

    <meta name="author" content="NYDev Team" />
    <meta name="creator" content="NYDev Team" />
    <meta name="application-name" content="NYDL" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="color-scheme" content="light dark" />

    <!-- ========================================================= -->
    <!-- Robots -->
    <!-- ========================================================= -->

    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- ========================================================= -->
    <!-- Canonical -->
    <!-- ========================================================= -->

    <link rel="canonical" href="https://nydl.dev" />

    <!-- ========================================================= -->
    <!-- Icons -->
    <!-- ========================================================= -->

    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ========================================================= -->
    <!-- Open Graph (Facebook, LinkedIn, Discord, Telegram...) -->
    <!-- ========================================================= -->

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NYDL" />
    <meta property="og:title" content="NYDL | NYDev Learning" />

    <meta
      property="og:description"
      content="Learn Software Development through live mentor-led online cohorts. Frontend, Backend, Mobile, Cybersecurity, DevOps, AI and more."
    />

    <meta property="og:url" content="https://nydl.dev" />

    <meta
      property="og:image"
      content="https://nydl.dev"
    />

    <meta
      property="og:image:secure_url"
      content="https://nydl.dev"
    />

    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ========================================================= -->
    <!-- Twitter / X -->
    <!-- ========================================================= -->

    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="NYDL | NYDev Learning"
    />

    <meta
      name="twitter:description"
      content="Learn software development through live online cohorts with mentors, projects, certifications and internship opportunities."
    />

    <meta
      name="twitter:image"
      content="https://nydl.dev"
    />

    <!-- ========================================================= -->
    <!-- Mobile -->
    <!-- ========================================================= -->

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta
      name="apple-mobile-web-app-title"
      content="NYDL"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />

    <!-- ========================================================= -->
    <!-- Performance & Icons -->
    <!-- ========================================================= -->

    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ========================================================= -->
    <!-- Title -->
    <!-- ========================================================= -->

    <title>
      NYDL | NYDev Learning - Learn. Build. Grow. Lead.
    </title>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to use NYDL.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
